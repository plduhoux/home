name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run generate

      # OVH mutualisé doesn't serve .wasm with correct MIME type
      - name: Fix WASM MIME type for _nuxt
        run: |
          echo '<FilesMatch "\.wasm$">' > .output/public/_nuxt/.htaccess
          echo '  ForceType application/wasm' >> .output/public/_nuxt/.htaccess
          echo '</FilesMatch>' >> .output/public/_nuxt/.htaccess

      - name: Deploy via LFTP
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -e "set mirror:parallel-transfer-count 5; set mirror:parallel-directories true; open ftp.cluster003.hosting.ovh.net; user $FTP_USERNAME $FTP_PASSWORD; mirror -X .git -X .git/ --include .htaccess --reverse --verbose --delete --parallel=5 .output/public/ ./; bye"
